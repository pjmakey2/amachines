<div class="container-fluid p-3">
    <h5 class="mb-3">Resumen de Recibo</h5>

    <!-- Info del cliente -->
    <div class="row mb-3">
        <div class="col-md-6">
            <div class="form-floating form-floating-sm">
                <input type="text" id="recibo_cliente_nombre" class="form-control" readonly>
                <label>Cliente</label>
            </div>
        </div>
        <div class="col-md-6">
            <div class="form-floating form-floating-sm">
                <input type="text" id="recibo_cliente_ruc" class="form-control" readonly>
                <label>RUC</label>
            </div>
        </div>
    </div>

    <!-- Tabla de facturas -->
    <div class="table-responsive">
        <table class="table table-sm table-striped" id="tabla_recibo_resumen">
            <thead>
                <tr>
                    <th>Numero</th>
                    <th class="text-end">Total Factura</th>
                    <th class="text-end">Total Pagado</th>
                    <th class="text-end">Saldo</th>
                    <th class="text-center">Estado</th>
                </tr>
            </thead>
            <tbody id="recibo_resumen_body">
                <tr><td colspan="5" class="text-center text-muted">Cargando...</td></tr>
            </tbody>
            <tfoot>
                <tr class="fw-bold">
                    <th>TOTALES</th>
                    <th class="text-end" id="recibo_total_factura">Gs 0</th>
                    <th class="text-end" id="recibo_total_cobrado">Gs 0</th>
                    <th class="text-end" id="recibo_total_saldo">Gs 0</th>
                    <th></th>
                </tr>
            </tfoot>
        </table>
    </div>

    <!-- Boton confirmar -->
    <div class="d-flex justify-content-end mt-3">
        <button type="button" class="btn btn-success btn-lg" id="btn-confirmar-recibo">
            <i class="mdi mdi-file-document-outline"></i> Confirmar y Generar Recibo
        </button>
    </div>
</div>

<script type="text/javascript">
// Cargar datos del resumen al abrir
(function() {
    let facturaIds = window.cobroReciboData || [];
    if (!facturaIds.length) {
        $('#recibo_resumen_body').html('<tr><td colspan="5" class="text-center text-danger">No hay facturas seleccionadas</td></tr>');
        $('#btn-confirmar-recibo').prop('disabled', true);
        return;
    }

    let gbe = new FormData();
    gbe.append('module', 'Cobro');
    gbe.append('package', 'mng_cobro');
    gbe.append('attr', 'MCobro');
    gbe.append('mname', 'get_resumen_recibo_cobro');
    gbe.append('dbcon', 'default');
    facturaIds.forEach(id => gbe.append('facturas[]', id));

    axios.post('{% url "iom" %}', gbe, {
        headers: {'X-CSRFToken': OptsIO.getCookie('csrftoken')}
    }).then((rsp) => {
        if (rsp.data.error) {
            $('#recibo_resumen_body').html(`<tr><td colspan="5" class="text-center text-danger">${rsp.data.error}</td></tr>`);
            $('#btn-confirmar-recibo').prop('disabled', true);
            return;
        }

        if (rsp.data.success) {
            let d = rsp.data;
            $('#recibo_cliente_nombre').val(d.cliente.pdv_nombrefactura);
            $('#recibo_cliente_ruc').val(d.cliente.pdv_ruc);

            let tbody = $('#recibo_resumen_body');
            tbody.empty();

            d.facturas.forEach((f) => {
                let estadoBadge = f.estado === 'PAGADO'
                    ? '<span class="badge bg-success">PAGADO</span>'
                    : '<span class="badge bg-warning text-dark">PARCIAL</span>';

                tbody.append(`
                    <tr>
                        <td>${f.doc_numero}</td>
                        <td class="text-end">Gs ${UiN.formatNumberU(f.total_factura.toFixed(0))}</td>
                        <td class="text-end">Gs ${UiN.formatNumberU(f.cobrado.toFixed(0))}</td>
                        <td class="text-end">Gs ${UiN.formatNumberU(f.saldo.toFixed(0))}</td>
                        <td class="text-center">${estadoBadge}</td>
                    </tr>
                `);
            });

            $('#recibo_total_factura').text('Gs ' + UiN.formatNumberU(d.totales.total_factura.toFixed(0)));
            $('#recibo_total_cobrado').text('Gs ' + UiN.formatNumberU(d.totales.total_cobrado.toFixed(0)));
            $('#recibo_total_saldo').text('Gs ' + UiN.formatNumberU(d.totales.total_saldo.toFixed(0)));
        }
    });
})();

// Confirmar y generar recibo
$('#btn-confirmar-recibo').on('click', function() {
    let facturaIds = window.cobroReciboData || [];

    Swal.fire({
        title: 'Generar Recibo?',
        text: 'Se generara un recibo con las facturas seleccionadas',
        icon: 'question',
        showCancelButton: true,
        confirmButtonColor: '#28a745',
        cancelButtonColor: '#6c757d',
        confirmButtonText: 'Si, generar',
        cancelButtonText: 'Cancelar'
    }).then((result) => {
        if (result.isConfirmed) {
            let gbe = new FormData();
            gbe.append('module', 'Cobro');
            gbe.append('package', 'mng_cobro');
            gbe.append('attr', 'MCobro');
            gbe.append('mname', 'crear_recibo_cobro');
            gbe.append('dbcon', 'default');
            facturaIds.forEach(id => gbe.append('facturas[]', id));

            axios.post('{% url "iom" %}', gbe, {
                headers: {'X-CSRFToken': OptsIO.getCookie('csrftoken')}
            }).then((rsp) => {
                if (rsp.data.success) {
                    UiB.MsgSuccess(rsp.data.message);

                    // Cerrar offcanvas
                    let offcanvasEl = document.getElementById('offcanvasGlobalUi');
                    let bsOffcanvas = bootstrap.Offcanvas.getInstance(offcanvasEl);
                    if (bsOffcanvas) bsOffcanvas.hide();

                    // Refrescar tabla y resumen
                    if (typeof window.cobroTableGuid !== 'undefined') {
                        $(`#${window.cobroTableGuid}`).DataTable().ajax.reload();
                    }
                    if (typeof window.cargarResumenCobros === 'function') {
                        window.cargarResumenCobros();
                    }

                    // Limpiar checkboxes
                    if (typeof window.limpiarSeleccionRecibo === 'function') {
                        window.limpiarSeleccionRecibo();
                    }
                } else if (rsp.data.error) {
                    UiB.MsgError(rsp.data.error);
                }
            });
        }
    });
});
</script>
